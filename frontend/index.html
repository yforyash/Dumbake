<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220%22 width=%22100%22 height=%22100%22><text y=%220.9em%22 font-size=%2290%22>🍰</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Dumbake - Premium Artisan Bakery</title>
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#9A0F29" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <link rel="apple-touch-icon" href="/pwa-icon.png" />
    
    <!-- Google Fonts for Premium Branding -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700;800&family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&display=swap" rel="stylesheet">
    
    <!-- Leaflet CSS for Map Rendering -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    
    <!-- Custom Debug Error Overlay -->
    <script>
      window.addEventListener('error', function(event) {
        setTimeout(function() {
          const errorDiv = document.createElement('div');
          errorDiv.id = 'debug-error-screen';
          errorDiv.style.position = 'fixed';
          errorDiv.style.top = '0';
          errorDiv.style.left = '0';
          errorDiv.style.width = '100vw';
          errorDiv.style.height = '100vh';
          errorDiv.style.background = '#ffffff';
          errorDiv.style.color = '#D05A6F';
          errorDiv.style.padding = '40px';
          errorDiv.style.zIndex = '999999';
          errorDiv.style.overflow = 'auto';
          errorDiv.style.fontFamily = 'monospace';
          errorDiv.style.boxSizing = 'border-box';
          errorDiv.innerHTML = '<h1 style="margin-top:0;">🚨 Dumbake Runtime JavaScript Error</h1>' +
            '<p style="font-size:16px;"><strong>Error Message:</strong> ' + event.message + '</p>' +
            '<p style="font-size:14px;color:#666;"><strong>File:</strong> ' + event.filename + ' | <strong>Line:</strong> ' + event.lineno + ':' + event.colno + '</p>' +
            '<pre style="background:#fff5f6;padding:20px;border-radius:8px;border:1px solid #ffb7c5;color:#333;font-size:13px;line-height:1.5;overflow-x:auto;">' + 
            (event.error ? event.error.stack : 'No stack trace available') + '</pre>';
          document.body.appendChild(errorDiv);
        }, 100);
      });
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
